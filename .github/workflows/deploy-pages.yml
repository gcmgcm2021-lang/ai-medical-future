name: Deploy AI Medical Future Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Extract media assets from original HTML
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const crypto = require('node:crypto');

          const candidates = [
            'ai-medical-future-gcm-preview-base64-full-original.html',
            'ai-medical-future-gcm-preview-base64-full-original (1).html'
          ];
          const source = candidates.find((file) => fs.existsSync(file));

          if (!source) {
            console.log('No Base64 source HTML found; using committed static files.');
            if (!fs.existsSync('index.html')) {
              throw new Error('index.html is missing.');
            }
            if (!fs.existsSync('assets')) {
              throw new Error('assets directory is missing.');
            }
            fs.writeFileSync('.nojekyll', '');
            process.exit(0);
          }

          const names = new Map([
            [1, 'hero-cover.jpg'],
            [2, 'hero-image.jpg'],
            [3, 'background-music.mp3'],
            [4, 'article-01.png'],
            [5, 'article-02.png'],
            [6, 'article-03.png'],
            [7, 'article-04.png'],
            [8, 'article-05.png'],
            [9, 'article-06.png'],
            [10, 'article-07.png'],
            [11, 'comic-summary.jpg']
          ]);
          const extByMime = new Map([
            ['image/jpeg', 'jpg'],
            ['image/png', 'png'],
            ['audio/mpeg', 'mp3']
          ]);

          fs.rmSync('assets', { recursive: true, force: true });
          fs.mkdirSync('assets', { recursive: true });

          const html = fs.readFileSync(source, 'utf8');
          const seen = new Map();
          let occurrence = 0;
          const mediaPattern = /data:(?<mime>[A-Za-z0-9.+-]+\/[A-Za-z0-9.+-]+);base64,(?<data>[A-Za-z0-9+/=]+)/g;
          const output = html.replace(mediaPattern, (match, _mimeArg, _dataArg, _offset, _whole, groups) => {
            occurrence += 1;
            const mime = groups.mime;
            const bytes = Buffer.from(groups.data, 'base64');
            const hash = crypto.createHash('sha256').update(bytes).digest('hex');
            if (seen.has(hash)) {
              return seen.get(hash);
            }
            const fallbackExt = extByMime.get(mime) || 'bin';
            const filename = names.get(occurrence) || `asset-${String(occurrence).padStart(2, '0')}.${fallbackExt}`;
            const rel = `assets/${filename}`;
            fs.writeFileSync(path.join('assets', filename), bytes);
            seen.set(hash, rel);
            return rel;
          });

          if (occurrence === 0) {
            throw new Error('No Base64 media data URIs were found.');
          }
          if (/data:[^;]+;base64,/.test(output)) {
            throw new Error('Base64 media references remain after extraction.');
          }

          fs.writeFileSync('index.html', output);
          fs.writeFileSync('.nojekyll', '');
          console.log(`Extracted ${seen.size} unique media files from ${occurrence} references.`);
          NODE

      - name: Commit generated static assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets .nojekyll
          git rm -f -- "ai-medical-future-gcm-preview-base64-full-original.html" "ai-medical-future-gcm-preview-base64-full-original (1).html" || true
          if ! git diff --cached --quiet; then
            git commit -m "Extract media assets for GitHub Pages"
            git push
          else
            echo "No generated asset changes to commit."
          fi

      - name: Prepare Pages artifact
        run: |
          rm -rf _site
          mkdir _site
          cp index.html _site/
          cp .nojekyll _site/
          cp -R assets _site/assets

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
